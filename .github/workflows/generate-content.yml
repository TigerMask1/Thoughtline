name: Generate Content (Staggered)

# Fires 4x/day at roughly spread-out UTC hours. Each run adds a random 0-50 min
# jitter before doing anything, so publish times don't look machine-perfect and
# Google isn't seeing 4 pages land in the same instant.
on:
  schedule:
    - cron: "10 2 * * *"   # ~02:10 UTC + jitter
    - cron: "40 8 * * *"   # ~08:40 UTC + jitter
    - cron: "5 14 * * *"   # ~14:05 UTC + jitter
    - cron: "25 20 * * *"  # ~20:25 UTC + jitter
  workflow_dispatch: {}   # manual trigger from the Actions tab, no jitter

permissions:
  contents: write

concurrency:
  group: content-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Random jitter delay
        if: github.event_name == 'schedule'
        run: |
          SLEEP_SECONDS=$((RANDOM % 3000))  # 0-50 minutes
          echo "Sleeping ${SLEEP_SECONDS}s before generating"
          sleep "$SLEEP_SECONDS"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate page
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PAGES_PER_RUN: "1"
        run: python scripts/generate.py

      - name: Commit and push new page
        run: |
          git config user.name "content-bot"
          git config user.email "content-bot@users.noreply.github.com"
          git add _posts topics/used.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Add generated page ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git pull --rebase --autostash origin main
          git push