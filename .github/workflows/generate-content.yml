name: Generate Daily Content

on:
  schedule:
    # Runs at 08:00 UTC every day. Adjust the cron to whatever time you want.
    - cron: "0 8 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab too

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate pages
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PAGES_PER_RUN: "4"
        run: python scripts/generate.py

      - name: Commit and push new pages
        run: |
          git config user.name "content-bot"
          git config user.email "content-bot@users.noreply.github.com"
          git add _posts topics/used.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Add daily generated pages ($(date -u +%Y-%m-%d))"
          git push
