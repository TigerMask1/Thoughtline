title: "Thoughtline"
tagline: "considered picks, not padded lists"
hero_headline: "Ideas worth the click."
description: "Thoughtline is a small, considered guide to gifts, everyday buying decisions, and the little things that are easy to get wrong. No filler, no fluff — just the specific answer you came for."
url: "https://tigermask1.github.io"
baseurl: "/Thoughtline"

markdown: kramdown
theme: minima

# Google AdSense client ID goes here once approved, e.g. "ca-pub-XXXXXXXXXXXX"
adsense_client: ""

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

permalink: /:categories/:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
