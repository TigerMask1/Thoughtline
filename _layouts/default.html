<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% elsif page.excerpt and page.excerpt != '' %}{{ page.excerpt | strip_html | truncate: 155 }}{% else %}{{ site.description }}{% endif %}">

  <!-- Open Graph / social preview -->
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% elsif page.excerpt and page.excerpt != '' %}{{ page.excerpt | strip_html | truncate: 155 }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="{{ site.title }}">
  {% if page.image %}<meta property="og:image" content="{{ page.image }}">{% endif %}
  <meta name="twitter:card" content="{% if page.image %}summary_large_image{% else %}summary{% endif %}">
  <meta name="theme-color" content="#fdfdfc">

  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/logo.svg' | relative_url }}">
  <meta name="google-site-verification" content="EjN61tLQOww8B_YMbpo7BJH4DAaXWJ5bz10kkuDo5Ho" />

  {% if page.layout == 'post' %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": {{ page.title | jsonify }},
    "description": {{ page.description | default: site.description | jsonify }},
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.date | date_to_xmlschema }}"
    {% if page.image %}, "image": "{{ page.image }}"{% endif %},
    "publisher": {
      "@type": "Organization",
      "name": {{ site.title | jsonify }}
    },
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "{{ page.url | absolute_url }}"
    }
  }
  </script>
  {% endif %}

  <!-- Typefaces: Space Grotesk (display) / Source Serif 4 (body) / JetBrains Mono (meta) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  {% if site.adsense_client and site.adsense_client != "" %}
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ site.adsense_client }}" crossorigin="anonymous"></script>
  {% endif %}

  {% feed_meta %}
</head>
<body>
  <div class="glare" aria-hidden="true"></div>

  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="brand-mark">
          <img src="{{ '/assets/img/logo.svg' | relative_url }}" alt="{{ site.title }}" width="34" height="34">
        </span>
        <span class="brand-name">{{ site.title }}</span>
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Latest</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </nav>
    </header>

    {{ content }}

    <footer class="site-footer">
      <span>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}</span>
      <span>{{ site.tagline }}</span>
    </footer>
  </div>
</body>
</html>
